<!-- OpenPiAmp Theme Editor  outputs theme.json for the Pygame player -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Theme Editor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
  </head>

  <body>

    <nav class="navbar navbar-dark bg-black mb-4">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Theme Editor</span>
      </div>
    </nav>

    <div class="container">
      <div class="row g-4">

        <!-- Canvas preview sized to the selected preset, scaled up via CSS -->
        <div class="col-md-5 text-center">
          <canvas id="preview" class="border rounded shadow-sm"></canvas>
          <div class="form-text mt-2">Live preview  redraws on every control change.</div>
        </div>

        <div class="col-md-7">

          <!-- theme.json > screen: target resolution and orientation -->
          <div class="card mb-3">
            <div class="card-header bg-primary text-white fw-bold">Screen</div>
            <div class="card-body row g-3">
              <div class="col-6">
                <label class="form-label" for="presetSelect">Size preset</label>
                <!-- options populated from theme.screen.presets by app.js -->
                <select id="presetSelect" class="form-select"></select>
              </div>
              <div class="col-6">
                <label class="form-label" for="orientationSelect">Orientation</label>
                <select id="orientationSelect" class="form-select">
                  <option value="portrait">Portrait</option>
                  <option value="landscape">Landscape</option>
                </select>
              </div>
            </div>
          </div>

          <!-- theme.json > cover_art: art panel scaling + no-art fallback -->
          <div class="card mb-3">
            <div class="card-header bg-primary text-white fw-bold">Cover Art</div>
            <div class="card-body row g-3">
              <div class="col-12">
                <label class="form-label" for="coverArtMode">Display mode</label>
                <select id="coverArtMode" class="form-select">
                  <option value="fill">Fill (crop)</option>
                  <option value="bars">Bars (letterbox)</option>
                  <option value="stretch">Stretch</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label" for="noCoverBehavior">No cover art behavior</label>
                <select id="noCoverBehavior" class="form-select">
                  <option value="visualizer">Visualizer</option>
                  <option value="cassette">Cassette Tape</option>
                </select>
              </div>
              <!-- custom cassette image  loaded into memory only, not saved in theme.json -->
              <div class="col-12 d-flex align-items-center gap-2">
                <input type="file" id="tapeInput" accept="image/*" class="d-none">
                <button id="tapeBtn" class="btn btn-secondary btn-sm">Load Cassette Image</button>
                <span id="tapeBtnLabel" class="form-text mb-0">Default (cassettetape.png)</span>
              </div>
            </div>
          </div>

          <!-- theme.json > button.radius: corner radius for all control buttons -->
          <div class="card mb-3">
            <div class="card-header bg-primary text-white fw-bold">Button</div>
            <div class="card-body">
              <label class="form-label" for="radiusRange">Corner radius: <span id="radiusValue">0</span>px</label>
              <input type="range" class="form-range" id="radiusRange" min="0" max="30" step="1">
            </div>
          </div>

          <!-- theme.json > layout: all positions/sizes as 0–1 fractions of W or H -->
          <div class="card mb-3">
            <div class="card-header bg-primary text-white fw-bold">Layout</div>
            <div class="card-body p-2">
              <!-- accordion sections built dynamically by buildLayoutControls() -->
              <div id="layoutAccordion" class="accordion accordion-flush"></div>
            </div>
          </div>

          <!-- theme.json > palette: [R,G,B] colour entries, keyed to match ui.py constants -->
          <div class="card mb-3">
            <div class="card-header bg-primary text-white fw-bold">Palette</div>
            <div class="card-body">
              <!-- swatches built dynamically by populatePalette() -->
              <div id="paletteGrid" class="row row-cols-2 row-cols-lg-3 g-2"></div>
            </div>
          </div>

          <!-- Load/save theme.json; simulate a track (ID3 tags only, no audio playback) -->
          <div class="card mb-3">
            <div class="card-header bg-primary text-white fw-bold">Actions</div>
            <div class="card-body d-flex flex-wrap gap-2">
              <input type="file" id="loadInput" accept="application/json" class="d-none">
              <input type="file" id="trackInput" accept="audio/*" class="d-none">
              <button id="loadBtn"  class="btn btn-warning">Load theme.json</button>
              <button id="saveBtn"  class="btn btn-success">Save theme.json</button>
              <button id="trackBtn" class="btn btn-info">Load Track</button>
              <button id="resetBtn" class="btn btn-danger">Reset</button>
            </div>
          </div>

        </div>
      </div>
    </div>

    <footer class="text-center text-muted py-4 mt-4 border-top">
      <small>OpenPiAmp Theme Editor</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- local copy for offline / file:// use -->
    <script src="jsmediatags.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
